name: Auto-merge Dependabot PRs

on:
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  pull-requests: write

env:
  MERGE_METHOD: SQUASH

jobs:
  auto-merge:
    name: Auto-merge if Copilot review is clean
    runs-on: ubuntu-latest
    if: |
      github.event.pull_request.user.login == 'dependabot[bot]' &&
      github.event.review.user.login == 'copilot-pull-request-reviewer[bot]' &&
      github.event.review.state == 'approved'

    steps:
      - name: Check for Copilot inline comments and enable auto-merge
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const pull_number = context.payload.pull_request.number;

            // Check for inline review comments from Copilot
            const { data: reviewComments } = await github.rest.pulls.listReviewComments({
              owner, repo, pull_number,
            });

            const copilotComments = reviewComments.filter(
              c => c.user?.login === 'copilot-pull-request-reviewer[bot]'
            );

            if (copilotComments.length > 0) {
              core.notice(`Copilot left ${copilotComments.length} comment(s) — skipping auto-merge.`);
              return;
            }

            // Resolve the PR's GraphQL node ID
            const prData = await github.graphql(`
              query GetPRId($owner: String!, $repo: String!, $number: Int!) {
                repository(owner: $owner, name: $repo) {
                  pullRequest(number: $number) { id }
                }
              }
            `, { owner, repo, number: pull_number });

            const prId = prData.repository.pullRequest.id;

            // Enable auto-merge — GitHub will merge once all required checks pass
            const mergeMethod = process.env.MERGE_METHOD || 'SQUASH';
            await github.graphql(`
              mutation EnableAutoMerge($prId: ID!, $mergeMethod: PullRequestMergeMethod!) {
                enablePullRequestAutoMerge(input: { pullRequestId: $prId, mergeMethod: $mergeMethod }) {
                  pullRequest { autoMergeRequest { mergeMethod } }
                }
              }
            `, { prId, mergeMethod });

            core.notice('Auto-merge enabled — will merge once all required checks pass.');
