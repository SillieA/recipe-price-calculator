name: Auto-merge Dependabot PRs

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    name: Auto-merge if Copilot review has no comments
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'

    steps:
      - name: Wait for Copilot review
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const pull_number = context.payload.pull_request.number;

            // Poll for a completed Copilot review (up to ~5 min)
            const maxAttempts = 30;
            const delayMs = 10000;

            let copilotReview = null;
            for (let attempt = 0; attempt < maxAttempts; attempt++) {
              const { data: reviews } = await github.rest.pulls.listReviews({
                owner, repo, pull_number,
              });

              copilotReview = reviews.find(
                r => r.user?.login === 'copilot-pull-request-reviewer[bot]' &&
                     (r.state === 'APPROVED' || r.state === 'CHANGES_REQUESTED' || r.state === 'COMMENTED')
              );

              if (copilotReview) break;
              if (attempt < maxAttempts - 1) {
                await new Promise(resolve => setTimeout(resolve, delayMs));
              }
            }

            if (!copilotReview) {
              core.notice('No Copilot review found — skipping auto-merge.');
              return;
            }

            if (copilotReview.state !== 'APPROVED') {
              core.notice(`Copilot review state is "${copilotReview.state}" — skipping auto-merge.`);
              return;
            }

            // Check for inline review comments
            const { data: reviewComments } = await github.rest.pulls.listReviewComments({
              owner, repo, pull_number,
            });

            const copilotComments = reviewComments.filter(
              c => c.user?.login === 'copilot-pull-request-reviewer[bot]'
            );

            if (copilotComments.length > 0) {
              core.notice(`Copilot left ${copilotComments.length} comment(s) — skipping auto-merge.`);
              return;
            }

            // Enable auto-merge (squash)
            await github.rest.pulls.merge({
              owner, repo, pull_number,
              merge_method: 'squash',
            });
            core.notice('Dependabot PR auto-merged.');
